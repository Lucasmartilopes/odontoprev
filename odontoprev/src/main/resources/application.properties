# Neon (projeto odontoprev) — URL e usuário fixos. Você só informa a SENHA.
# PowerShell: $env:NEON_PASSWORD="sua_senha"
# Azure App Service → Configuration → NEON_PASSWORD = sua senha
spring.datasource.url=jdbc:postgresql://ep-dry-cell-acmh4xmz-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=${NEON_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
