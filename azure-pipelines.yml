# =============================================================================
# OdontoPrev — CI (integração contínua) — Azure DevOps Sprint 2
# =============================================================================
# Pipelines → Existing YAML → Branch main → /azure-pipelines.yml → Run
#
# Deploy no Azure (CD): depois de criar Service connections, use
# /azure-pipelines-cd.yml (segundo pipeline) — ver Readme.md
# =============================================================================

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  mavenFolder: odontoprev

stages:
  - stage: CI
    displayName: CI — Build, testes e imagem Docker
    jobs:
      - job: BuildAndTest
        displayName: Maven + Docker build
        steps:
          - checkout: self
            fetchDepth: 0

          - task: JavaToolInstaller@0
            displayName: Instalar JDK 17
            inputs:
              versionSpec: "17"
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - script: |
              set -e
              cd "$(mavenFolder)"
              bash ./mvnw -B verify
            displayName: Maven verify (testes automatizados)

          - task: Docker@2
            displayName: Docker build (valida Dockerfile)
            inputs:
              command: build
              Dockerfile: "$(Build.SourcesDirectory)/$(mavenFolder)/Dockerfile"
              buildContext: "$(Build.SourcesDirectory)/$(mavenFolder)"
              repository: odontoprev
              tags: |
                $(Build.BuildId)
