# =============================================================================
# OdontoPrev — CD (deploy) — use DEPOIS de criar Service connections no DevOps
# =============================================================================
# Pipelines → New pipeline → mesmo repo → Path: /azure-pipelines-cd.yml
#
# Variáveis (Pipeline → Edit → Variables):
#   azureSubscription   = nome da conexão ARM (ex.: sc-azure-odontoprev)
#   acrServiceConnection = nome da conexão Docker/ACR (ex.: sc-acr-odontoprev)
#   acrLoginServer      = ex.: acrodontoprevlucas.azurecr.io
#   webAppName          = odontoprev-lucas123
# =============================================================================

trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  mavenFolder: odontoprev

stages:
  - stage: CD
    displayName: CD — Push ACR + deploy App Service
    jobs:
      - job: PushAndDeploy
        displayName: Push imagem e atualizar Web App
        steps:
          - checkout: self
            fetchDepth: 0

          - task: Docker@2
            displayName: Build e push para Azure Container Registry
            inputs:
              command: buildAndPush
              Dockerfile: "$(Build.SourcesDirectory)/$(mavenFolder)/Dockerfile"
              buildContext: "$(Build.SourcesDirectory)/$(mavenFolder)"
              containerRegistry: "$(acrServiceConnection)"
              repository: odontoprev
              tags: |
                $(Build.BuildId)
                latest

          - task: AzureWebAppContainer@1
            displayName: Deploy no Azure App Service
            inputs:
              azureSubscription: "$(azureSubscription)"
              appName: "$(webAppName)"
              containers: "$(acrLoginServer)/odontoprev:$(Build.BuildId)"
